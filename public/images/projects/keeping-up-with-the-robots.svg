<svg width="1200" height="800" viewBox="0 0 1200 800" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Keeping Up With The Robots — live Western Massachusetts AI newsletter">
  <defs>
    <linearGradient id="kur-bg" x1="0" y1="0" x2="1200" y2="800" gradientUnits="userSpaceOnUse">
      <stop stop-color="#10150f"/>
      <stop offset="1" stop-color="#0b0e0b"/>
    </linearGradient>
    <radialGradient id="kur-glow" cx="0" cy="0" r="1" gradientTransform="translate(880 280) rotate(130) scale(420)">
      <stop stop-color="#8fac7e" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#8fac7e" stop-opacity="0"/>
    </radialGradient>
    <pattern id="kur-grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0V48" fill="none" stroke="#20281f" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1200" height="800" fill="url(#kur-bg)"/>
  <rect width="1200" height="800" fill="url(#kur-grid)" opacity="0.6"/>
  <rect width="1200" height="800" fill="url(#kur-glow)"/>

  <g stroke="#8fac7e" stroke-width="2" stroke-linecap="round" opacity="0.7">
    <path d="M48 48h28M48 48v28"/>
    <path d="M1152 48h-28M1152 48v28"/>
    <path d="M48 752h28M48 752v-28"/>
    <path d="M1152 752h-28M1152 752v-28"/>
  </g>

  <text x="80" y="118" font-family="ui-monospace, Menlo, monospace" font-size="22" letter-spacing="6" fill="#7f7d72">PROJECT // 003</text>
  <g>
