  <text x="80" y="500" font-family="Georgia, 'Times New Roman', serif" font-size="84" font-weight="600" fill="#ece6d8">Keeping Up</text>
  <text x="80" y="588" font-family="Georgia, 'Times New Roman', serif" font-size="84" font-weight="600" fill="#ece6d8">With The Robots</text>
  <text x="82" y="646" font-family="ui-sans-serif, system-ui, sans-serif" font-size="26" fill="#b8b2a3">Western Mass AI newsletter &amp; community · Resend</text>

