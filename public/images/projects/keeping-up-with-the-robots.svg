    <text x="1000" y="118" font-family="ui-monospace, Menlo, monospace" font-size="22" letter-spacing="4" fill="#8fac7e">LIVE · 200 OK</text>
  </g>

  <!-- friendly robot / signal motif -->
  <g transform="translate(880 300)">
    <line x1="0" y1="-118" x2="0" y2="-92" stroke="#8fac7e" stroke-width="3" stroke-linecap="round"/>
    <circle cx="0" cy="-126" r="7" fill="#ec8b56"/>
    <rect x="-66" y="-92" width="132" height="108" rx="22" fill="#161c17" stroke="#2a342c" stroke-width="2"/>
    <circle cx="-26" cy="-44" r="13" fill="#8fac7e"/>
    <circle cx="26" cy="-44" r="13" fill="#8fac7e"/>
    <path d="M-30 -8h60" stroke="#3a463b" stroke-width="4" stroke-linecap="round"/>
    <!-- signal waves -->
