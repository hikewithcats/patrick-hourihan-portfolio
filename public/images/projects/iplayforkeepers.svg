<svg width="1200" height="800" viewBox="0 0 1200 800" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="IPlayForKeepers — dynasty fantasy-football platform, working prototype">
  <defs>
    <linearGradient id="ipfk-bg" x1="0" y1="0" x2="1200" y2="800" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0f140f"/>
      <stop offset="1" stop-color="#0b0e0b"/>
    </linearGradient>
    <radialGradient id="ipfk-glow" cx="0" cy="0" r="1" gradientTransform="translate(900 520) rotate(-120) scale(440)">
      <stop stop-color="#8fac7e" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#8fac7e" stop-opacity="0"/>
    </radialGradient>
    <pattern id="ipfk-grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0V48" fill="none" stroke="#20281f" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1200" height="800" fill="url(#ipfk-bg)"/>
  <rect width="1200" height="800" fill="url(#ipfk-grid)" opacity="0.6"/>
  <rect width="1200" height="800" fill="url(#ipfk-glow)"/>

  <!-- gridiron yard lines (field-report) -->
  <g stroke="#2a342c" stroke-width="2" opacity="0.55">
    <path d="M760 150v520M860 150v520M960 150v520M1060 150v520"/>
  </g>
  <g stroke="#8fac7e" stroke-width="2" opacity="0.5" font-family="ui-monospace, Menlo, monospace">
    <path d="M810 150v520" stroke-dasharray="4 10"/>
  </g>

  <g stroke="#8fac7e" stroke-width="2" stroke-linecap="round" opacity="0.7">
    <path d="M48 48h28M48 48v28"/>
    <path d="M1152 48h-28M1152 48v28"/>
    <path d="M48 752h28M48 752v-28"/>
    <path d="M1152 752h-28M1152 752v-28"/>
  </g>

  <text x="80" y="118" font-family="ui-monospace, Menlo, monospace" font-size="22" letter-spacing="6" fill="#7f7d72">PROJECT // 002</text>
  <text x="1120" y="118" text-anchor="end" font-family="ui-monospace, Menlo, monospace" font-size="22" letter-spacing="4" fill="#8fac7e">STATUS: PROTOTYPE</text>

  <!-- phone-first motif -->
  <g transform="translate(905 300)">
    <rect x="-58" y="-96" width="116" height="200" rx="20" fill="#161c17" stroke="#2a342c" stroke-width="2"/>
    <rect x="-44" y="-72" width="88" height="14" rx="4" fill="#8fac7e" opacity="0.65"/>
    <rect x="-44" y="-48" width="88" height="10" rx="3" fill="#2a342c"/>
    <rect x="-44" y="-30" width="60" height="10" rx="3" fill="#2a342c"/>
    <rect x="-44" y="-6" width="88" height="10" rx="3" fill="#2a342c"/>
    <rect x="-44" y="12" width="48" height="10" rx="3" fill="#ec8b56" opacity="0.7"/>
    <rect x="-44" y="36" width="88" height="10" rx="3" fill="#2a342c"/>
    <rect x="-18" y="78" width="36" height="6" rx="3" fill="#3a463b"/>
  </g>

  <text x="80" y="520" font-family="Georgia, 'Times New Roman', serif" font-size="92" font-weight="600" fill="#ece6d8">IPlayForKeepers</text>
  <text x="82" y="580" font-family="ui-sans-serif, system-ui, sans-serif" font-size="28" fill="#b8b2a3">Dynasty &amp; best-ball leagues, phone-first · 16 screens</text>

  <line x1="80" y1="640" x2="1120" y2="640" stroke="#2a342c" stroke-width="1"/>
  <text x="80" y="686" font-family="ui-monospace, Menlo, monospace" font-size="20" letter-spacing="3" fill="#7f7d72">NEXT.JS · OPENNEXT · CLOUDFLARE WORKERS</text>
</svg>
