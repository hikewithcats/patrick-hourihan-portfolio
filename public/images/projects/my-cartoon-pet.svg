<svg width="1200" height="800" viewBox="0 0 1200 800" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="My Cartoon Pet — AI pet-cartoon SaaS, in development">
  <defs>
    <linearGradient id="mcp-bg" x1="0" y1="0" x2="1200" y2="800" gradientUnits="userSpaceOnUse">
      <stop stop-color="#11160f"/>
      <stop offset="1" stop-color="#0c0f0c"/>
    </linearGradient>
    <radialGradient id="mcp-glow" cx="0" cy="0" r="1" gradientTransform="translate(880 250) rotate(120) scale(420)">
      <stop stop-color="#d96a33" stop-opacity="0.20"/>
      <stop offset="1" stop-color="#d96a33" stop-opacity="0"/>
    </radialGradient>
    <pattern id="mcp-grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0V48" fill="none" stroke="#20281f" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1200" height="800" fill="url(#mcp-bg)"/>
  <rect width="1200" height="800" fill="url(#mcp-grid)" opacity="0.6"/>
  <rect width="1200" height="800" fill="url(#mcp-glow)"/>

  <!-- registration corners -->
  <g stroke="#d96a33" stroke-width="2" stroke-linecap="round" opacity="0.7">
    <path d="M48 48h28M48 48v28"/>
    <path d="M1152 48h-28M1152 48v28"/>
    <path d="M48 752h28M48 752v-28"/>
    <path d="M1152 752h-28M1152 752v-28"/>
  </g>

  <!-- labels -->
  <text x="80" y="118" font-family="ui-monospace, Menlo, monospace" font-size="22" letter-spacing="6" fill="#7f7d72">PROJECT // 001</text>
  <text x="1120" y="118" text-anchor="end" font-family="ui-monospace, Menlo, monospace" font-size="22" letter-spacing="4" fill="#ec8b56">STATUS: IN DEVELOPMENT</text>

  <!-- motif: photo frame -> cartoon paw -->
  <g transform="translate(820 300)">
    <rect x="-70" y="-70" width="140" height="140" rx="16" fill="none" stroke="#2a342c" stroke-width="2"/>
    <rect x="-70" y="-70" width="140" height="140" rx="16" fill="#161c17" opacity="0.5"/>
    <g fill="#ec8b56">
      <circle cx="-22" cy="-14" r="13"/>
      <circle cx="14" cy="-22" r="13"/>
      <circle cx="40" cy="2" r="11"/>
      <circle cx="-44" cy="14" r="11"/>
      <path d="M-6 8c22 0 40 14 40 32 0 14-18 16-40 16s-40-2-40-16c0-18 18-32 40-32Z"/>
    </g>
    <path d="M86 -36 130 -36 130 8" stroke="#8fac7e" stroke-width="2" fill="none" stroke-linecap="round"/>
    <text x="150" y="2" font-family="ui-monospace, Menlo, monospace" font-size="18" fill="#8fac7e">img2img</text>
  </g>

  <!-- title -->
  <text x="80" y="540" font-family="Georgia, 'Times New Roman', serif" font-size="96" font-weight="600" fill="#ece6d8">My Cartoon Pet</text>
  <text x="82" y="600" font-family="ui-sans-serif, system-ui, sans-serif" font-size="28" fill="#b8b2a3">AI mascots from a single pet photo · Supabase · Stripe</text>

  <line x1="80" y1="660" x2="1120" y2="660" stroke="#2a342c" stroke-width="1"/>
  <text x="80" y="706" font-family="ui-monospace, Menlo, monospace" font-size="20" letter-spacing="3" fill="#7f7d72">SAAS · NEXT.JS · POSTGRES · RLS · REPLICATE</text>
</svg>
