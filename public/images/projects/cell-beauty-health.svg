<svg width="1200" height="800" viewBox="0 0 1200 800" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Cell Beauty Health — live client marketing website">
  <defs>
    <linearGradient id="cbh-bg" x1="0" y1="0" x2="1200" y2="800" gradientUnits="userSpaceOnUse">
      <stop stop-color="#10140f"/>
      <stop offset="1" stop-color="#0b0e0c"/>
    </linearGradient>
    <radialGradient id="cbh-glow" cx="0" cy="0" r="1" gradientTransform="translate(900 300) rotate(125) scale(440)">
      <stop stop-color="#8fac7e" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#8fac7e" stop-opacity="0"/>
