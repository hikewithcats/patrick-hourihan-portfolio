    <path d="M1152 48h-28M1152 48v28"/>
    <path d="M48 752h28M48 752v-28"/>
    <path d="M1152 752h-28M1152 752v-28"/>
  </g>

  <text x="80" y="118" font-family="ui-monospace, Menlo, monospace" font-size="22" letter-spacing="6" fill="#7f7d72">CLIENT // WEB</text>
  <g>
    <circle cx="1004" cy="110" r="7" fill="#8fac7e"/>
    <text x="1026" y="118" font-family="ui-monospace, Menlo, monospace" font-size="22" letter-spacing="4" fill="#8fac7e">LIVE · 200 OK</text>
  </g>

