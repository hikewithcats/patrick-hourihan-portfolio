  <g transform="translate(885 300)" stroke="#8fac7e" stroke-width="2" opacity="0.9">
    <circle cx="0" cy="0" r="78" fill="none" stroke="#2a342c"/>
    <line x1="-40" y1="-30" x2="36" y2="20" stroke="#3a463b"/>
    <line x1="36" y1="20" x2="-10" y2="56" stroke="#3a463b"/>
    <line x1="-40" y1="-30" x2="-44" y2="34" stroke="#3a463b"/>
    <circle cx="-40" cy="-30" r="12" fill="#ec8b56" stroke="none"/>
    <circle cx="36" cy="20" r="10" fill="#8fac7e" stroke="none"/>
    <circle cx="-10" cy="56" r="8" fill="#8fac7e" stroke="none"/>
    <circle cx="-44" cy="34" r="8" fill="#ece6d8" stroke="none" opacity="0.7"/>
    <circle cx="28" cy="-44" r="7" fill="#8fac7e" stroke="none"/>
  </g>

  <text x="80" y="520" font-family="Georgia, 'Times New Roman', serif" font-size="94" font-weight="600" fill="#ece6d8">Cell Beauty Health</text>
  <text x="82" y="580" font-family="ui-sans-serif, system-ui, sans-serif" font-size="28" fill="#b8b2a3">Responsive marketing site for a wellness brand</text>

