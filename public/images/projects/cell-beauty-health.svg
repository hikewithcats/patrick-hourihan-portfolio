    <pattern id="cbh-grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0V48" fill="none" stroke="#20281f" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1200" height="800" fill="url(#cbh-bg)"/>
